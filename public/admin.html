<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Admin Dashboard</title>

<link rel="stylesheet" href="/css/style.css"/>
</head>

<body>

<!-- =========================
     LOGIN
========================= -->
<div id="loginBox">

  <h2>Admin Access</h2>

  <div class="form-group">
    <input id="user" placeholder="Username"/>
  </div>

  <div class="form-group">
    <input id="pass" type="password" placeholder="Password"/>
  </div>

  <button id="loginBtn" class="btn-primary">
    Login
  </button>

</div>

<!-- =========================
     PANEL
========================= -->
<div id="panel" class="hidden admin">

  <h1 class="admin-title">Dashboard</h1>

  <div class="admin-grid">

    <!-- =====================
         LEFT: FORM
    ====================== -->

<button id="showEditorBtn">
  Nuovo prodotto
</button>

    <div class="panel-card" id="newProduct">

      <h3>Nuovo prodotto</h3>

      <div class="form-group">
        <input id="nome" placeholder="Nome prodotto"/>
      </div>

      <div class="form-group">
        <input id="price" placeholder="Prezzo"/>
      </div>

      <div class="form-group">
        <input id="desc" placeholder="Descrizione"/>
      </div>

      <div class="form-group">
        <select id="category">
          <option>Caffetteria</option>
          <option>dolce</option>
          <option>salato</option>
          <option>Te</option>
          <option>Specialità</option>
          <option>beverage</option>
        </select>
      </div>

      <div class="form-group">
        <input type="file" id="image"/>
      </div>

      <!-- IMAGE PREVIEW -->
      <div class="preview" id="preview">
        <img id="previewImg"/>
      </div>

      <button id="addBtn" class="btn-primary">
        Aggiungi prodotto
      </button>

    </div>

    <!-- =====================
         RIGHT: DASHBOARD + LIST
    ====================== -->
    <div>

      <!-- DASHBOARD -->
      <div class="dashboard">

        <div class="stat-card">
          <span>Prodotti</span>
          <strong id="statTotal">0</strong>
        </div>

        <div class="stat-card">
          <span>Visibili</span>
          <strong id="statVisible">0</strong>
        </div>

      </div>

      <!-- LIST -->
      <div id="list"></div>

      <!-- EMPTY STATE -->
      <div id="empty" class="empty-state hidden">
        <h3>☕ Nessun prodotto</h3>
        <p>Aggiungi il primo prodotto per iniziare</p>
      </div>

    </div>

  </div>

</div>

<!-- =========================
     SCRIPTS
========================= -->
<script src="/js/toast.js"></script>
<script src="/js/modal.js"></script>
<script src="/js/admin.js"></script>


</body>
</html>
